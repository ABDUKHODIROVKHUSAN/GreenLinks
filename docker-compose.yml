services:
  postgres:
    image: postgres:16-alpine
    container_name: golf-ecommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Husan1108      
      POSTGRES_DB: golf_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: golf-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: golf-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata: